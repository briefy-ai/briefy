resolver __RESOLVER__ valid=30s;

map $http_user_agent $is_crawler {
    default 0;
    ~*(facebookexternalhit|Slackbot|LinkedInBot|Twitterbot|WhatsApp|Discordbot|Embedly|Applebot|TelegramBot) 1;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location = /sw.js {
        add_header Cache-Control "no-cache" always;
        try_files $uri =404;
    }

    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache" always;
        try_files $uri =404;
    }

    location ^~ /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    location /api {
        set $backend "http://briefy-api.railway.internal:8080";
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/share/(?<share_token>.+)$ {
        error_page 418 = @share_crawler;
        if ($is_crawler) {
            return 418;
        }
        try_files $uri $uri/ /index.html;
    }

    location @share_crawler {
        set $crawler_backend "http://briefy-api.railway.internal:8080";
        proxy_pass $crawler_backend/api/public/share-html/$share_token;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
