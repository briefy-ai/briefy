resolver __RESOLVER__ valid=30s;

map $http_user_agent $is_crawler {
    default 0;
    ~*(facebookexternalhit|Slackbot|LinkedInBot|Twitterbot|WhatsApp|Discordbot|Embedly|Applebot|TelegramBot) 1;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location = /sw.js {
        add_header Cache-Control "no-cache" always;
        try_files $uri =404;
    }

    location = /manifest.webmanifest {
        default_type "application/manifest+json";
        add_header Cache-Control "no-cache" always;
        try_files $uri =404;
    }

    location ^~ /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    location /api {
        set $backend "http://briefy-api.railway.internal:8080";
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_buffer_size 16k;
        proxy_buffers 8 256k;
        proxy_busy_buffers_size 512k;
        proxy_read_timeout 120s;
    }

    location /oauth/ {
        set $oauth_backend "http://briefy-api.railway.internal:8080";
        proxy_pass $oauth_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_buffer_size 16k;
        proxy_buffers 8 256k;
        proxy_busy_buffers_size 512k;
        proxy_read_timeout 120s;
    }

    # MCP clients (Inspector v0.21 etc.) probe these bare paths as a fallback
    # when discovery doesn't pin them down. Forward to the API where the
    # /authorize, /token, /revoke aliases live.
    location = /authorize {
        set $authorize_backend "http://briefy-api.railway.internal:8080";
        proxy_pass $authorize_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    location = /token {
        set $token_backend "http://briefy-api.railway.internal:8080";
        proxy_pass $token_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    location = /revoke {
        set $revoke_backend "http://briefy-api.railway.internal:8080";
        proxy_pass $revoke_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    location = /.well-known/oauth-authorization-server {
        set $wellknown_backend "http://briefy-api.railway.internal:8080";
        proxy_pass $wellknown_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    location ^~ /.well-known/oauth-protected-resource {
        set $wellknown_pr_backend "http://briefy-api.railway.internal:8080";
        proxy_pass $wellknown_pr_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    location /mcp/ {
        set $mcp_backend "http://briefy-api.railway.internal:8080";
        proxy_pass $mcp_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        chunked_transfer_encoding on;
        # Make sure edge caches don't hold the SSE stream.
        add_header X-Accel-Buffering no always;
        add_header Cache-Control "no-cache, no-store, no-transform" always;
    }

    location ~ ^/share/(?<share_token>.+)$ {
        error_page 418 = @share_crawler;
        if ($is_crawler) {
            return 418;
        }
        try_files $uri $uri/ /index.html;
    }

    location @share_crawler {
        set $crawler_backend "http://briefy-api.railway.internal:8080";
        proxy_pass $crawler_backend/api/public/share-html/$share_token;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_buffer_size 16k;
        proxy_buffers 8 256k;
        proxy_busy_buffers_size 512k;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
