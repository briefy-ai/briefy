resolver __RESOLVER__ valid=30s;

map $http_user_agent $is_crawler {
    default 0;
    ~*(facebookexternalhit|Slackbot|LinkedInBot|Twitterbot|WhatsApp|Discordbot|Embedly|Applebot|TelegramBot) 1;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location /api {
        set $backend "http://briefy-api.railway.internal:8080";
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/share/(.+)$ {
        set $token $1;
        set $crawler_backend "http://briefy-api.railway.internal:8080";
        if ($is_crawler) {
            proxy_pass $crawler_backend/api/public/share-html/$token;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        try_files $uri $uri/ /index.html;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
