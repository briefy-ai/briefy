spring:
  application:
    name: briefy-api

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/briefy}
    username: ${DB_USER:briefy}
    password: ${DB_PASSWORD:briefy}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  ai:
    model:
      chat: ${LLM_PROVIDER:none}
      embedding: none
      image: none
    zhipuai:
      api-key: ${ZHIPUAI_API_KEY:${LLM_API_KEY:}}
      base-url: ${ZHIPUAI_BASE_URL:https://api.z.ai/api/paas}
      chat:
        api-key: ${ZHIPUAI_CHAT_API_KEY:${ZHIPUAI_API_KEY:${LLM_API_KEY:}}}
        base-url: ${ZHIPUAI_CHAT_BASE_URL:${ZHIPUAI_BASE_URL:https://api.z.ai/api/paas}}
        options:
          model: ${ZHIPUAI_CHAT_MODEL:glm-4.7-flash}
    minimax:
      api-key: ${MINIMAX_API_KEY:}
      chat:
        api-key: ${MINIMAX_CHAT_API_KEY:${MINIMAX_API_KEY:}}
        options:
          model: ${MINIMAX_CHAT_MODEL:MiniMax-M2.5}
    google:
      genai:
        api-key: ${GOOGLE_GENAI_API_KEY:}
        chat:
          options:
            model: ${GOOGLE_GENAI_CHAT_MODEL:gemini-2.5-flash}
    chat:
      observations:
        log-prompt: ${SPRING_AI_CHAT_OBSERVATIONS_LOG_PROMPT:true}
        log-completion: ${SPRING_AI_CHAT_OBSERVATIONS_LOG_COMPLETION:true}
      memory:
        repository:
          jdbc:
            initialize-schema: never
    embedding:
      observations:
        log-query-response: ${SPRING_AI_EMBEDDING_OBSERVATIONS_LOG_QUERY_RESPONSE:true}

server:
  port: ${SERVER_PORT:8081}

auth:
  jwt:
    secret: ${JWT_SECRET:dev-secret-change-me-dev-secret-change-me}
    access-token-minutes: ${JWT_ACCESS_TOKEN_MINUTES:15}
  refresh-token:
    days: ${JWT_REFRESH_TOKEN_DAYS:30}
  cookie:
    secure: ${AUTH_COOKIE_SECURE:false}
    same-site: ${AUTH_COOKIE_SAME_SITE:Lax}

oauth:
  server:
    base-url: ${OAUTH_SERVER_BASE_URL:http://localhost:8080}
    refresh-token-days: ${OAUTH_REFRESH_TOKEN_DAYS:90}

security:
  encryption-key: ${ENCRYPTION_KEY:MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}

extraction:
  media:
    ffmpeg-path: ${EXTRACTION_MEDIA_FFMPEG_PATH:${YOUTUBE_FFMPEG_PATH:ffmpeg}}
    command-timeout-seconds: ${EXTRACTION_MEDIA_COMMAND_TIMEOUT_SECONDS:${YOUTUBE_COMMAND_TIMEOUT_SECONDS:180}}
  firecrawl:
    base-url: ${FIRECRAWL_BASE_URL:https://api.firecrawl.dev}
    wait-for-ms: ${FIRECRAWL_WAIT_FOR_MS:1000}
    agent:
      model: ${FIRECRAWL_AGENT_MODEL:spark-1-mini}
      poll-interval-ms: ${FIRECRAWL_AGENT_POLL_INTERVAL_MS:500}
      max-wait-ms: ${FIRECRAWL_AGENT_MAX_WAIT_MS:45000}
      max-credits: ${FIRECRAWL_AGENT_MAX_CREDITS:0}
  x-api:
    base-url: ${X_API_BASE_URL:https://api.x.com}
    timeout-ms: ${X_API_TIMEOUT_MS:10000}
    thread-max-results: ${X_API_THREAD_MAX_RESULTS:100}
    video:
      max-duration-seconds: ${X_API_VIDEO_MAX_DURATION_SECONDS:900}
      max-download-bytes: ${X_API_VIDEO_MAX_DOWNLOAD_BYTES:104857600}
      download-timeout-ms: ${X_API_VIDEO_DOWNLOAD_TIMEOUT_MS:15000}
  supadata:
    base-url: ${SUPADATA_BASE_URL:https://api.supadata.ai}
    timeout-ms: ${SUPADATA_TIMEOUT_MS:15000}
  youtube:
    enabled: ${YOUTUBE_EXTRACTION_ENABLED:true}
    yt-dlp-path: ${YOUTUBE_YT_DLP_PATH:yt-dlp}
    ffmpeg-path: ${YOUTUBE_FFMPEG_PATH:ffmpeg}
    max-duration-seconds: ${YOUTUBE_MAX_DURATION_SECONDS:7200}
    command-timeout-seconds: ${YOUTUBE_COMMAND_TIMEOUT_SECONDS:180}
    worker:
      poll-ms: ${YOUTUBE_WORKER_POLL_MS:5000}
      batch-size: ${YOUTUBE_WORKER_BATCH_SIZE:5}
      max-attempts: ${YOUTUBE_WORKER_MAX_ATTEMPTS:5}
      processing-timeout-seconds: ${YOUTUBE_WORKER_PROCESSING_TIMEOUT_SECONDS:900}
      lock-heartbeat-ms: ${YOUTUBE_WORKER_LOCK_HEARTBEAT_MS:30000}

transcription:
  openai:
    api-key: ${TRANSCRIPTION_OPENAI_API_KEY:${OPENAI_API_KEY:}}
    model: ${TRANSCRIPTION_OPENAI_MODEL:whisper-1}

audio:
  storage:
    endpoint: ${AUDIO_STORAGE_ENDPOINT:http://localhost:9000}
    access-key-id: ${AUDIO_STORAGE_ACCESS_KEY:minioadmin}
    secret-access-key: ${AUDIO_STORAGE_SECRET_KEY:minioadmin}
    bucket: ${AUDIO_STORAGE_BUCKET:briefy-audio}
    region: ${AUDIO_STORAGE_REGION:us-east-1}
    presigned-url-expiry-hours: ${AUDIO_STORAGE_PRESIGNED_URL_EXPIRY_HOURS:24}

tts:
  max-characters: ${TTS_MAX_CHARACTERS:${ELEVENLABS_MAX_CHARACTERS:100000}}
  elevenlabs:
    base-url: ${ELEVENLABS_BASE_URL:https://api.elevenlabs.io}
    voice-id: ${ELEVENLABS_VOICE_ID:iiidtqDt9FBdT1vfBluA}
    default-model-id: ${ELEVENLABS_MODEL_ID:eleven_flash_v2_5}
  inworld:
    base-url: ${INWORLD_BASE_URL:https://api.inworld.ai}
    english-voice-id: ${INWORLD_ENGLISH_VOICE_ID:Craig}
    spanish-voice-id: ${INWORLD_SPANISH_VOICE_ID:Miguel}
    default-model-id: ${INWORLD_MODEL_ID:inworld-tts-1.5-mini}
    max-characters-per-request: ${INWORLD_MAX_CHARACTERS_PER_REQUEST:2000}

google:
  auth:
    enabled: ${GOOGLE_AUTH_ENABLED:false}
    client-id: ${GOOGLE_CLIENT_ID:}
    client-secret: ${GOOGLE_CLIENT_SECRET:}
    redirect-uri: ${GOOGLE_REDIRECT_URI:}

management:
  tracing:
    sampling:
      probability: ${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:1.0}
  endpoints:
    web:
      exposure:
        include: health,info

ai:
  embedding:
    openai:
      api-key: ${AI_EMBEDDING_OPENAI_API_KEY:${OPENAI_API_KEY:}}
      base-url: ${AI_EMBEDDING_OPENAI_BASE_URL:https://api.openai.com}
  observability:
    enabled: ${AI_OBSERVABILITY_ENABLED:true}
    langfuse:
      base-url: ${LANGFUSE_BASE_URL:https://cloud.langfuse.com}
      public-key: ${LANGFUSE_PUBLIC_KEY:}
      secret-key: ${LANGFUSE_SECRET_KEY:}

telegram:
  integration:
    enabled: ${TELEGRAM_INTEGRATION_ENABLED:true}
  bot:
    token: ${TELEGRAM_BOT_TOKEN:}
    username: ${TELEGRAM_BOT_USERNAME:}
  webhook:
    url: ${TELEGRAM_WEBHOOK_URL:}
    secret-token: ${TELEGRAM_WEBHOOK_SECRET_TOKEN:}
  links:
    web-base-url: ${BRIEFY_WEB_BASE_URL:http://localhost:3000}
  ingestion:
    worker:
      poll-ms: ${TELEGRAM_INGESTION_WORKER_POLL_MS:5000}
      batch-size: ${TELEGRAM_INGESTION_WORKER_BATCH_SIZE:5}
      max-attempts: ${TELEGRAM_INGESTION_WORKER_MAX_ATTEMPTS:3}

briefing:
  planning:
    enabled: ${BRIEFING_PLANNING_ENABLED:true}
    provider: ${BRIEFING_PLANNING_PROVIDER:google_genai}
    model: ${BRIEFING_PLANNING_MODEL:gemini-3-flash-preview}
  execution:
    enabled: ${BRIEFING_EXECUTION_ENABLED:true}
    mode: ${BRIEFING_EXECUTION_MODE:sequential}
    global-timeout-seconds: ${BRIEFING_EXECUTION_GLOBAL_TIMEOUT_SECONDS:180}
    subagent-timeout-seconds: ${BRIEFING_EXECUTION_SUBAGENT_TIMEOUT_SECONDS:90}
    max-attempts: ${BRIEFING_EXECUTION_MAX_ATTEMPTS:3}
    runner: ${BRIEFING_EXECUTION_RUNNER:deterministic}
    synthesis: ${BRIEFING_EXECUTION_SYNTHESIS:ai}
    ai:
      provider: ${BRIEFING_EXECUTION_AI_PROVIDER:google_genai}
      model: ${BRIEFING_EXECUTION_AI_MODEL:gemini-2.5-flash}
    retry:
      transient-delay-first-seconds: ${BRIEFING_EXECUTION_RETRY_TRANSIENT_DELAY_FIRST_SECONDS:1}
      transient-delay-second-seconds: ${BRIEFING_EXECUTION_RETRY_TRANSIENT_DELAY_SECOND_SECONDS:2}
      http429-fallback-first-seconds: ${BRIEFING_EXECUTION_RETRY_HTTP429_FALLBACK_FIRST_SECONDS:2}
      http429-fallback-second-seconds: ${BRIEFING_EXECUTION_RETRY_HTTP429_FALLBACK_SECOND_SECONDS:4}
    tools:
      web-search:
        enabled: ${BRIEFING_WEB_SEARCH_ENABLED:false}
        brave-api-key: ${BRAVE_SEARCH_API_KEY:}
        brave-base-url: ${BRAVE_SEARCH_BASE_URL:https://api.search.brave.com}
        timeout-ms: ${BRIEFING_WEB_SEARCH_TIMEOUT_MS:10000}
      web-fetch:
        enabled: ${BRIEFING_WEB_FETCH_ENABLED:false}
        timeout-ms: ${BRIEFING_WEB_FETCH_TIMEOUT_MS:15000}
        max-body-bytes: ${BRIEFING_WEB_FETCH_MAX_BODY_BYTES:512000}
      source-lookup:
        enabled: ${BRIEFING_SOURCE_LOOKUP_ENABLED:false}
  generation:
    enabled: ${BRIEFING_GENERATION_ENABLED:true}
    worker:
      poll-ms: ${BRIEFING_GENERATION_WORKER_POLL_MS:5000}
      batch-size: ${BRIEFING_GENERATION_WORKER_BATCH_SIZE:5}

cover-image:
  prompt-crafting:
    enabled: ${COVER_IMAGE_PROMPT_CRAFTING_ENABLED:true}
    provider: ${COVER_IMAGE_PROMPT_CRAFTING_PROVIDER:google_genai}
    model: ${COVER_IMAGE_PROMPT_CRAFTING_MODEL:gemini-2.5-flash}

chat:
  conversation:
    provider: ${CHAT_CONVERSATION_PROVIDER:google_genai}
    model: ${CHAT_CONVERSATION_MODEL:gemini-3.1-flash-lite-preview}
    tools:
      web-search:
        enabled: ${CHAT_WEB_SEARCH_ENABLED:false}
      web-fetch:
        enabled: ${CHAT_WEB_FETCH_ENABLED:false}
    memory:
      max-messages: ${CHAT_CONVERSATION_MEMORY_MAX_MESSAGES:20}
